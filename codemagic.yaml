workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.7
    scripts:
      - name: Get Flutter packages
        script: |
          cd power6_mobile
          flutter pub get
      - name: Build APK
        script: |
          cd power6_mobile
          flutter clean
          flutter pub get
          flutter build apk --release
    artifacts:
      - power6_mobile/build/**/outputs/**/*.apk