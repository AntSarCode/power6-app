workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.7
    scripts:
      - name: Show Flutter version
        script: |
          flutter --version

      - name: Inspect Android files
        script: |
          cd power6_mobile
          pwd
          find android -maxdepth 4 -type f | sort
          echo "---- settings.gradle.kts ----"
          cat android/settings.gradle.kts
          echo "---- build.gradle.kts ----"
          cat android/build.gradle.kts
          echo "---- app/build.gradle.kts ----"
          cat android/app/build.gradle.kts
          echo "---- gradle-wrapper.properties ----"
          cat android/gradle/wrapper/gradle-wrapper.properties || true
          echo "---- grep legacy patterns ----"
          grep -Rni "apply from:\|apply plugin:\|app_plugin_loader.gradle\|flutter.gradle" android || true

      - name: Get Flutter packages
        script: |
          cd power6_mobile
          flutter pub get

      - name: Build APK
        script: |
          cd power6_mobile
          flutter clean
          flutter pub get
          flutter build apk --release
    artifacts:
      - power6_mobile/build/**/outputs/**/*.apk

  ios-workflow:
    name: iOS Workflow
    integrations:
      app_store_connect: power6_key
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      flutter: 3.41.7
      xcode: latest
      vars:
        BUNDLE_ID: "com.power6.app"   # <-- MUST match App Store Connect exactly
        DEVELOPMENT_TEAM: "97VTHZP969"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      ios_signing:
        provisioning_profiles:
          - power6_app_profile
        certificates:
          - power6_certificate

    scripts:
      - name: Show Flutter version
        script: |
          flutter --version

      - name: Inspect iOS files
        script: |
          cd power6_mobile
          pwd
          find ios -maxdepth 4 -type f | sort
          echo "---- Info.plist ----"
          cat ios/Runner/Info.plist || true
          echo "---- Podfile ----"
          cat ios/Podfile || true

      - name: Clean stale iOS Flutter config
        script: |
          cd power6_mobile
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          flutter clean

      - name: Get Flutter packages
        script: |
          cd power6_mobile
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd power6_mobile/ios
          pod install --repo-update

      - name: Force iOS signing settings to match provisioning profile
        script: |
          cd power6_mobile
          echo "Setting iOS bundle identifier to $BUNDLE_ID"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" ios/Runner/Info.plist || true
          python3 - <<'PY'
          from pathlib import Path
          p = Path('ios/Runner.xcodeproj/project.pbxproj')
          s = p.read_text()
          import re
          s = re.sub(r'PRODUCT_BUNDLE_IDENTIFIER = [^;]+;', 'PRODUCT_BUNDLE_IDENTIFIER = com.power6.app;', s)
          s = re.sub(r'DEVELOPMENT_TEAM = [^;]+;', 'DEVELOPMENT_TEAM = 97VTHZP969;', s)
          s = re.sub(r'CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;', s)
          s = re.sub(r'CODE_SIGN_STYLE = Manual;', 'CODE_SIGN_STYLE = Manual;', s)
          if 'DEVELOPMENT_TEAM = 97VTHZP969;' not in s:
              s = s.replace(
                  'PRODUCT_BUNDLE_IDENTIFIER = com.power6.app;',
                  'DEVELOPMENT_TEAM = 97VTHZP969;\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER = com.power6.app;'
              )
          p.write_text(s)
          PY
          echo "---- bundle identifiers ----"
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj
          echo "---- development team ----"
          grep -n "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj || true
          echo "---- code sign style ----"
          grep -n "CODE_SIGN_STYLE" ios/Runner.xcodeproj/project.pbxproj || true

      - name: Set up code signing settings on Xcode project
        script: |
          cd power6_mobile
          xcode-project use-profiles --project ios/Runner.xcodeproj
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>97VTHZP969</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.power6.app</key>
              <string>power6_app_profile</string>
            </dict>
          </dict>
          </plist>
          EOF
          echo "---- export options ----"
          cat /Users/builder/export_options.plist || true
          echo "---- available signing identities ----"
          security find-identity -v -p codesigning || true
          echo "---- installed provisioning profiles ----"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles || true

      - name: Build iOS (App Store signed IPA)
        script: |
          cd power6_mobile
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/power6_mobile/ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - power6_mobile/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

