workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.7
    scripts:
      - name: Show Flutter version
        script: |
          flutter --version

      - name: Inspect Android files
        script: |
          cd power6_mobile
          pwd
          find android -maxdepth 4 -type f | sort
          echo "---- settings.gradle.kts ----"
          cat android/settings.gradle.kts
          echo "---- build.gradle.kts ----"
          cat android/build.gradle.kts
          echo "---- app/build.gradle.kts ----"
          cat android/app/build.gradle.kts
          echo "---- gradle-wrapper.properties ----"
          cat android/gradle/wrapper/gradle-wrapper.properties || true
          echo "---- grep legacy patterns ----"
          grep -Rni "apply from:\|apply plugin:\|app_plugin_loader.gradle\|flutter.gradle" android || true

      - name: Get Flutter packages
        script: |
          cd power6_mobile
          flutter pub get

      - name: Build APK
        script: |
          cd power6_mobile
          flutter clean
          flutter pub get
          flutter build apk --release
    artifacts:
      - power6_mobile/build/**/outputs/**/*.apk

  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.7
      xcode: latest
      vars:
        BUNDLE_ID: "com.power6.app"   # <-- MUST match App Store Connect exactly
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID

    scripts:
      - name: Show Flutter version
        script: |
          flutter --version

      - name: Inspect iOS files
        script: |
          cd power6_mobile
          pwd
          find ios -maxdepth 4 -type f | sort
          echo "---- Info.plist ----"
          cat ios/Runner/Info.plist || true
          echo "---- Podfile ----"
          cat ios/Podfile || true

      - name: Clean stale iOS Flutter config
        script: |
          cd power6_mobile
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          flutter clean

      - name: Get Flutter packages
        script: |
          cd power6_mobile
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd power6_mobile/ios
          pod install --repo-update

      - name: Force iOS bundle identifier to match provisioning profile
        script: |
          cd power6_mobile
          echo "Setting iOS bundle identifier to $BUNDLE_ID"
          sed -i '' "s/com.example.power6Mobile/$BUNDLE_ID/g" ios/Runner.xcodeproj/project.pbxproj
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj

      - name: Set up code signing settings on Xcode project
        script: |
          cd power6_mobile
          xcode-project use-profiles

      - name: Build iOS (App Store signed IPA)
        script: |
          cd power6_mobile
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - power6_mobile/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $CM_APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $CM_APP_STORE_CONNECT_KEY_ID
        issuer_id: $CM_APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
