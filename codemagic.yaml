workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.7
    scripts:
      - name: Show Flutter version
        script: |
          flutter --version

      - name: Inspect Android files
        script: |
          cd power6_mobile
          pwd
          find android -maxdepth 4 -type f | sort
          echo "---- settings.gradle.kts ----"
          cat android/settings.gradle.kts
          echo "---- build.gradle.kts ----"
          cat android/build.gradle.kts
          echo "---- app/build.gradle.kts ----"
          cat android/app/build.gradle.kts
          echo "---- gradle-wrapper.properties ----"
          cat android/gradle/wrapper/gradle-wrapper.properties || true
          echo "---- grep legacy patterns ----"
          grep -Rni "apply from:\\|apply plugin:\\|app_plugin_loader.gradle\\|flutter.gradle" android || true

      - name: Get Flutter packages
        script: |
          cd power6_mobile
          flutter pub get

      - name: Build APK
        script: |
          cd power6_mobile
          flutter clean
          flutter pub get
          flutter build apk --release
    artifacts:
      - power6_mobile/build/**/outputs/**/*.apk

  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.7
      xcode: latest
    scripts:
      - name: Show Flutter version
        script: |
          flutter --version

      - name: Inspect iOS files
        script: |
          cd power6_mobile
          pwd
          find ios -maxdepth 4 -type f | sort
          echo "---- Info.plist ----"
          cat ios/Runner/Info.plist || true
          echo "---- Podfile ----"
          cat ios/Podfile || true

      - name: Get Flutter packages
        script: |
          cd power6_mobile
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd power6_mobile/ios
          pod install

      - name: Build iOS unsigned
        script: |
          cd power6_mobile
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - power6_mobile/build/ios/iphoneos/Runner.app
