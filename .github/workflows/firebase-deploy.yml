name: Deploy Flutter Web to Firebase Hosting
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Flutter Pub Get
        working-directory: ./power6_mobile
        run: flutter pub get

      - name: Build Web (with API define)
        working-directory: ./power6_mobile
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=https://power6-backend.onrender.com

      - name: Stage web build to repo root /deploy_out
        run: |
          rm -rf deploy_out
          mkdir -p deploy_out
          rsync -a power6_mobile/build/web/ deploy_out/

      - name: Stamp Firebase Hosting build
        run: |
          printf '{"sha":"%s","run_id":"%s","run_attempt":"%s"}\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" \
            > power6_mobile/build/web/deploy-version.json

      - name: Deploy to Firebase Hosting (live)
        id: firebase_deploy
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_POWER6 }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Verify Firebase Hosting deployment
        run: |
          deployed_stamp="$(
            curl -fsSL \
              "https://power6-app-30bd8.web.app/deploy-version.json?run=$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          )"
          echo "$deployed_stamp"
          echo "$deployed_stamp" | grep -F "\"sha\":\"$GITHUB_SHA\""
